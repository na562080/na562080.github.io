    时间短促啊，还没干什么就过去了，真的是越来越能体验到时间的无情了
    在不需要的时候任你挥霍，在需要的时候却恍惚而过
    可惜再怎么想也是无能为力，多珍惜时间吧，何况平安也是奇迹
