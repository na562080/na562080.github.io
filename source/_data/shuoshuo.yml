    Long Season真的是梦幻，迷幻，这种霓虹灯光下的癫疯和狂气，这种无法抑制咆哮的生命力
    水声，风声，铃声，距离反复拉远又缩进，在固定旋律下自有一种永恒的恍惚，变化而又最终回复
    以前烦躁听不下去这么长的音乐，现在只觉太短不过瘾
- date: 2025-07-14 21:21:32
