    今天偶然听到别酱的ed，真是回忆满满，想到之前感慨'最美妙的一件事就是听着音乐还能复苏当时的情感，哪怕忘却'
    生活确实曲折太多，正是因为有了念想所见不至于一片黑暗
    反正活着真好，只有活着才能体验
